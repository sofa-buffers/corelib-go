name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build & test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Oldest supported (matches go.mod) plus the current stable release.
        go: ['1.21', 'stable']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: Download modules
        run: go mod download

      - name: Verify formatting (gofmt)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race + coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -n 1

      - name: Upload coverage artifact
        if: matrix.go == 'stable'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error

      - name: Upload coverage to Codecov
        if: matrix.go == 'stable'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: unittests
          # Optional for public repos; add a CODECOV_TOKEN repo secret to make
          # uploads reliable (required for private repos).
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
