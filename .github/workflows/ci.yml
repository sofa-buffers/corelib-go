name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build & test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Oldest supported (matches go.mod) plus the current stable release.
        go: ['1.21', 'stable']
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: Download modules
        run: go mod download

      - name: Verify formatting (gofmt)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race)
        run: go test -race ./...

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write # to publish the generated badge to the `badges` branch
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: stable
          check-latest: true

      - name: Generate coverage profile
        # Cover the library package; the perfbench command has no tests.
        run: go test -covermode=atomic -coverprofile=coverage.out .

      - name: Compute coverage badge data
        id: cov
        run: |
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          int=${pct%.*}
          if   [ "$int" -ge 90 ]; then color=brightgreen
          elif [ "$int" -ge 75 ]; then color=green
          elif [ "$int" -ge 50 ]; then color=yellow
          else color=red; fi
          echo "Coverage: ${pct}% (${color})"
          echo "pct=${pct}" >> "$GITHUB_OUTPUT"
          mkdir -p badge
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' \
            "$pct" "$color" > badge/coverage.json

      - name: Publish badge to the badges branch
        # Only from CI runs on main itself: PRs (ref refs/pull/*/merge) and runs
        # on any other branch must not move the published badge.
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./badge
          publish_branch: badges
          force_orphan: true
          commit_message: "chore(badge): update coverage to ${{ steps.cov.outputs.pct }}"
